<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Alfred Reports</title>
  <meta name="description" content="{{SUMMARY}}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid #21262d;
      padding: 20px 0;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    .header-inner { display: flex; align-items: center; justify-content: space-between; }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #58a6ff;
      text-decoration: none;
    }

    .back-link {
      font-size: 13px;
      color: #8b949e;
      text-decoration: none;
    }

    .back-link:hover { color: #e6edf3; }

    .post-header { padding: 48px 0 32px; border-bottom: 1px solid #21262d; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .post-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 4px;
      background: #1f4068;
      color: #58a6ff;
    }

    .post-type.research { background: #1a3a2a; color: #3fb950; }
    .post-type.monitor  { background: #3d1f1f; color: #f85149; }
    .post-date { font-size: 13px; color: #8b949e; }

    .post-title { font-size: 32px; font-weight: 700; line-height: 1.25; margin-bottom: 16px; }

    .post-source {
      font-size: 13px;
      color: #8b949e;
    }

    .post-source a { color: #58a6ff; text-decoration: none; }

    .post-body { padding: 40px 0; }

    .opportunities-box {
      background: #161b22;
      border: 1px solid #f0883e55;
      border-left: 3px solid #ffa657;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 40px;
    }

    .opportunities-box h2 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #ffa657;
      margin-bottom: 12px;
    }

    .opportunities-box ul { list-style: none; }

    .opportunities-box li {
      font-size: 15px;
      color: #e6edf3;
      padding: 6px 0;
      border-bottom: 1px solid #21262d;
      line-height: 1.5;
    }

    .opportunities-box li:last-child { border-bottom: none; }
    .opportunities-box li::before { content: "→ "; color: #ffa657; font-weight: 700; }

    .section-heading {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin: 32px 0 16px;
    }

    .summary-text {
      font-size: 16px;
      line-height: 1.8;
      color: #c9d1d9;
      margin-bottom: 32px;
    }

    .raw-findings {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 13px;
      line-height: 1.7;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 500px;
      overflow-y: auto;
    }

    .ai-report {
      background: #161b22;
      border: 1px solid #21262d;
      border-left: 3px solid #58a6ff;
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 15px;
      line-height: 1.8;
      color: #c9d1d9;
      margin: 24px 0;
      white-space: pre-wrap;
    }

    footer {
      border-top: 1px solid #21262d;
      padding: 24px 0;
      margin-top: 40px;
    }

    footer p { font-size: 13px; color: #8b949e; text-align: center; }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <a href="../index.html" class="logo">🤖 Alfred Reports</a>
      <a href="../index.html" class="back-link">← All Reports</a>
    </div>
  </div>
</header>

<main class="container">
  <div class="post-header">
    <div class="post-meta">
      <span class="post-type {{TYPE}}">{{TYPE}}</span>
      <span class="post-date">{{DATE}} · {{TIME}}</span>
    </div>
    <h1 class="post-title">{{TITLE}}</h1>
    <div class="post-source">Source: <a href="{{URL}}" target="_blank">{{URL}}</a></div>
  </div>

  <div class="post-body">

    {{OPPORTUNITIES_HTML}}

    <div class="section-heading">Summary</div>
    <div class="summary-text">{{SUMMARY}}</div>

    {{AI_REPORT}}

    <div class="section-heading">Full Findings</div>
    <div class="raw-findings">{{RAW_TEXT}}</div>

  </div>
</main>

<footer>
  <div class="container">
    <p>Generated by <a href="../index.html">Alfred AI</a> · {{DATE}}</p>
  </div>
</footer>

</body>
</html>
